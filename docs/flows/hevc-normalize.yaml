name: hevc-normalize
description: |
  Re-encode anything not already hevc to x265 fast crf=19, ensure an English
  AC3 6ch audio track exists, and drop cover-art / data streams. Every
  per-stream decision is built up declaratively (`plan.*` steps) and
  materialized in a SINGLE ffmpeg pass via `plan.execute` — no chained tmp
  files, all subtitle tracks preserved.
enabled: true

triggers:
  - radarr: [downloaded, upgraded]
  - sonarr: [downloaded]

# Skip empty / unreadable files.
match:
  expr: file.size_gb > 0.001

steps:
  # Demux the largest BDMV/STREAM/*.m2ts out of any .iso input. No-ops for
  # non-ISO inputs. Threads the m2ts through the staging chain so probe sees
  # it; output:replace deletes the original .iso on success.
  - id: iso-extract
    use: iso.extract

  - id: probe
    use: probe

  # Bail cleanly if probe surfaced nothing.
  - id: bail-if-empty
    if: probe.streams == null
    then:
      - return: skipped-no-streams

  # Seed the plan from probe (every stream copied, container=mkv).
  - id: plan-init
    use: plan.init

  # Make ffmpeg tolerant of corrupt frames in the source.
  - id: plan-tolerate
    use: plan.input.tolerate_errors

  # Drop cover-art / attached_pic video streams.
  - id: plan-drop-cover-art
    use: plan.streams.drop_cover_art

  # Drop data streams (incompatible with most containers anyway).
  - id: plan-drop-data
    use: plan.streams.drop_data

  # Drop subtitle streams whose codec doesn't mux into the planned container
  # (e.g. mov_text from MP4 sources can't go into MKV). Without this, ffmpeg
  # bails at MKV muxer init with "Function not implemented" before any
  # encoding starts, and the broken near-empty tmp file confuses verify.
  - id: plan-drop-unsupported-subs
    use: plan.subs.drop_unsupported

  # If the video is NOT already hevc, mark it for re-encode.
  # (When already hevc, the plan keeps video as `copy` and we only do the
  # audio + container work in plan.execute.)
  - id: codec-gate
    if: probe.streams[0].codec_name == "hevc"
    then: []
    else:
      - id: plan-encode-video
        use: plan.video.encode
        with:
          codec: x265
          crf: 19
          preset: fast
          preserve_10bit: true
          hw:
            prefer: [nvenc, qsv, vaapi, videotoolbox]
            fallback: cpu

  # Ensure there's an English AC3 6ch audio track. Skipped if the source
  # already has one, or if dedupe says an existing playable track already
  # covers the channel count.
  - id: plan-ensure-audio
    use: plan.audio.ensure
    with:
      codec: ac3
      channels: 6
      language: eng
      dedupe: true

  # ONE ffmpeg invocation: re-encode video (or copy), copy every kept stream,
  # add the new audio track if any, write to mkv.
  - id: plan-execute
    use: plan.execute

  - id: verify
    use: verify.playable
    with: { min_duration_ratio: 0.99 }

  - id: swap
    use: output
    with: { mode: replace }

  - id: success-notify
    use: notify
    with:
      channel: tg-main
      template: "✓ {{ file.path }} normalized"

on_failure:
  - use: notify
    with:
      channel: tg-main
      template: "✗ {{ file.path }} failed at {{ failed.id }}: {{ failed.error }}"
