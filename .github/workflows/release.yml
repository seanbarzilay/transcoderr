name: release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  # Create the GitHub Release exactly once with auto-generated notes.
  # The build jobs below run in parallel, each calling softprops to
  # upload its binaries — without this dedicated job, each parallel
  # softprops call with `generate_release_notes: true` appended a
  # fresh copy of the changelog, producing 3× duplicated bodies.
  create-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true

  bins-linux-amd64:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: Build web assets
        run: |
          npm --prefix web ci
          npm --prefix web run build
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - name: Stamp tag version into Cargo.toml
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          V="${GITHUB_REF_NAME#v}"
          sed -i "s|^version = \".*\"|version = \"$V\"|" Cargo.toml
      - name: Build release binaries
        run: cargo build --release --workspace --target x86_64-unknown-linux-gnu
      - name: Stage artifacts
        run: |
          mkdir -p out
          cp target/x86_64-unknown-linux-gnu/release/transcoderr     out/transcoderr-linux-amd64
          cp target/x86_64-unknown-linux-gnu/release/transcoderr-mcp out/transcoderr-mcp-linux-amd64
      - uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: out/*

  bins-linux-arm64:
    needs: create-release
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: Build web assets
        run: |
          npm --prefix web ci
          npm --prefix web run build
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - name: Stamp tag version into Cargo.toml
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          V="${GITHUB_REF_NAME#v}"
          sed -i "s|^version = \".*\"|version = \"$V\"|" Cargo.toml
      - name: Build release binaries
        run: cargo build --release --workspace --target aarch64-unknown-linux-gnu
      - name: Stage artifacts
        run: |
          mkdir -p out
          cp target/aarch64-unknown-linux-gnu/release/transcoderr     out/transcoderr-linux-arm64
          cp target/aarch64-unknown-linux-gnu/release/transcoderr-mcp out/transcoderr-mcp-linux-arm64
      - uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: out/*

  bins-darwin-arm64:
    needs: create-release
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: Build web assets
        run: |
          npm --prefix web ci
          npm --prefix web run build
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - name: Stamp tag version into Cargo.toml
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          # macOS sed needs an explicit empty backup arg to -i.
          V="${GITHUB_REF_NAME#v}"
          sed -i '' "s|^version = \".*\"|version = \"$V\"|" Cargo.toml
      - name: Build release binaries
        run: cargo build --release --workspace --target aarch64-apple-darwin
      - name: Stage artifacts
        run: |
          mkdir -p out
          cp target/aarch64-apple-darwin/release/transcoderr     out/transcoderr-darwin-arm64
          cp target/aarch64-apple-darwin/release/transcoderr-mcp out/transcoderr-mcp-darwin-arm64
      - uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: out/*

  bins-windows-amd64:
    needs: create-release
    runs-on: windows-latest
    # Default shell is bash so the sed/cp/$GITHUB_REF_NAME bits below
    # work the same way they do on the Linux/macOS jobs (Git Bash on
    # Windows runners ships with GNU sed). Native PowerShell here would
    # need a separate `-replace` and `Copy-Item` form for those steps.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: Build web assets
        run: |
          npm --prefix web ci
          npm --prefix web run build
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Stamp tag version into Cargo.toml
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          V="${GITHUB_REF_NAME#v}"
          sed -i "s|^version = \".*\"|version = \"$V\"|" Cargo.toml
      - name: Build release binaries
        run: cargo build --release --workspace --target x86_64-pc-windows-msvc
      - name: Stage artifacts
        run: |
          mkdir -p out
          cp target/x86_64-pc-windows-msvc/release/transcoderr.exe     out/transcoderr-windows-amd64.exe
          cp target/x86_64-pc-windows-msvc/release/transcoderr-mcp.exe out/transcoderr-mcp-windows-amd64.exe
      - uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: out/*

  images:
    needs: bins-linux-amd64
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        flavor: [cpu, intel, nvidia, full]
    steps:
      - uses: actions/checkout@v5
      - name: Stamp tag version into Cargo.toml
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          V="${GITHUB_REF_NAME#v}"
          sed -i "s|^version = \".*\"|version = \"$V\"|" Cargo.toml
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.flavor }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ matrix.flavor }}-latest
            ghcr.io/${{ github.repository }}:${{ matrix.flavor }}-${{ github.ref_name }}
          platforms: linux/amd64
