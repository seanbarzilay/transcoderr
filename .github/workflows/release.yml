name: release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  bins-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build web assets
        run: |
          npm --prefix web ci
          npm --prefix web run build
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - name: Build release binary
        run: cargo build --release --locked --target x86_64-unknown-linux-gnu
      - name: Stage artifact
        run: |
          mkdir -p out
          cp target/x86_64-unknown-linux-gnu/release/transcoderr out/transcoderr-linux-amd64
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: out/*

  bins-darwin-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build web assets
        run: |
          npm --prefix web ci
          npm --prefix web run build
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - name: Build release binary
        run: cargo build --release --locked --target aarch64-apple-darwin
      - name: Stage artifact
        run: |
          mkdir -p out
          cp target/aarch64-apple-darwin/release/transcoderr out/transcoderr-darwin-arm64
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: out/*

  image-cpu:
    needs: bins-linux-amd64
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.cpu
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:cpu-latest
            ghcr.io/${{ github.repository }}:cpu-${{ github.ref_name }}
          platforms: linux/amd64
