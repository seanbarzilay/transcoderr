name: auto-release
on:
  push:
    branches: [main]
    # Only bump when a push actually changes code that ends up in a
    # binary or shipped artifact. Docs, the showcase site, design specs,
    # and other CI workflows don't earn a version bump on their own.
    # If a commit touches both code AND ignored paths, the code paths
    # win and the workflow still runs (GH Actions matches "any change
    # not in the ignore list").
    paths-ignore:
      - 'README.md'
      - '**/*.md'
      - 'docs/**'
      - 'site/**'
      - '.github/workflows/auto-release.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/tests.yml'
      - '.github/workflows/pages.yml'

permissions:
  contents: write
  actions: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine bump kind from commit message
        id: kind
        run: |
          MSG=$(git log -1 --pretty=%B)
          if echo "$MSG" | grep -qE '(BREAKING CHANGE|^[a-z]+(\([^)]+\))?!:)'; then
            echo "kind=major" >> "$GITHUB_OUTPUT"
          elif echo "$MSG" | grep -qE '^(Merge pull request[^"]*"feat|feat)(\(|:)'; then
            echo "kind=minor" >> "$GITHUB_OUTPUT"
          else
            echo "kind=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute new version from latest tag
        id: bump
        run: |
          set -euo pipefail
          # Tags are the source of truth, NOT Cargo.toml. Cargo.toml is a
          # development version that lags behind tags; release.yml stamps
          # the tag's version into Cargo.toml at build time so binaries
          # report the right version.
          LATEST_TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo "v0.0.0")
          CUR=${LATEST_TAG#v}
          IFS='.' read -r MAJ MIN PAT <<< "$CUR"
          case "${{ steps.kind.outputs.kind }}" in
            major) MAJ=$((MAJ+1)); MIN=0; PAT=0 ;;
            minor) MIN=$((MIN+1)); PAT=0 ;;
            patch) PAT=$((PAT+1)) ;;
          esac
          NEW="$MAJ.$MIN.$PAT"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "Tagging $LATEST_TAG → v$NEW (${{ steps.kind.outputs.kind }})"

      - name: Tag and push
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag "v${{ steps.bump.outputs.version }}"
          # Tag pushes are not blocked by branch protection (which scopes
          # to refs/heads). No commit is pushed to main.
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Dispatch release workflow on the new tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run release.yml --ref "v${{ steps.bump.outputs.version }}"
