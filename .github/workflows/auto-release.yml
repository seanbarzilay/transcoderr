name: auto-release
on:
  push:
    branches: [main]

permissions:
  contents: write
  actions: write

jobs:
  release:
    # Skip the workflow's own bump commit so we don't loop.
    if: "!startsWith(github.event.head_commit.message, 'chore: bump workspace version')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine bump kind from commit message
        id: kind
        run: |
          MSG=$(git log -1 --pretty=%B)
          if echo "$MSG" | grep -qE '(BREAKING CHANGE|^[a-z]+(\([^)]+\))?!:)'; then
            echo "kind=major" >> "$GITHUB_OUTPUT"
          elif echo "$MSG" | grep -qE '^(Merge pull request[^"]*"feat|feat)(\(|:)'; then
            echo "kind=minor" >> "$GITHUB_OUTPUT"
          else
            echo "kind=patch" >> "$GITHUB_OUTPUT"
          fi
          echo "Detected: $(cat "$GITHUB_OUTPUT")"

      - name: Compute new version
        id: bump
        run: |
          set -euo pipefail
          CUR=$(awk -F'"' '/^version = "/{print $2; exit}' Cargo.toml)
          IFS='.' read -r MAJ MIN PAT <<< "$CUR"
          case "${{ steps.kind.outputs.kind }}" in
            major) MAJ=$((MAJ+1)); MIN=0; PAT=0 ;;
            minor) MIN=$((MIN+1)); PAT=0 ;;
            patch) PAT=$((PAT+1)) ;;
          esac
          NEW="$MAJ.$MIN.$PAT"
          echo "current=$CUR" >> "$GITHUB_OUTPUT"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "Bumping $CUR → $NEW (${{ steps.kind.outputs.kind }})"

      - name: Update Cargo.toml
        run: |
          sed -i 's|^version = ".*"|version = "${{ steps.bump.outputs.version }}"|' Cargo.toml

      - uses: dtolnay/rust-toolchain@stable

      - name: Refresh Cargo.lock
        run: cargo build --workspace --offline 2>/dev/null || cargo build --workspace

      - name: Configure git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Commit + tag + push
        run: |
          set -euo pipefail
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump workspace version to ${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin main
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Dispatch release workflow on the new tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run release.yml --ref "v${{ steps.bump.outputs.version }}"
