name: tests
on:
  pull_request:
    branches: [main]
    # NOTE: no `paths-ignore` here. Branch protection requires the
    # `rust` and `web` checks to pass; if the workflow is skipped via
    # `paths-ignore` the checks never appear and the PR is unmergeable.
    # Instead, the workflow always runs and the heavy steps inside the
    # rust/web jobs are gated on whether the PR actually touched
    # files in their domain (see `changes` job below).
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read   # dorny/paths-filter reads the PR's changed files

concurrency:
  # One run per PR. Pushing a new commit cancels the in-flight run.
  group: tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/tests.yml'
            web:
              - 'web/**'
              - '.github/workflows/tests.yml'

  rust:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip — no rust-relevant changes
        if: needs.changes.outputs.rust != 'true'
        run: echo "No changes under crates/, Cargo.{toml,lock}, or tests.yml; skipping the rust test suite."
      - if: needs.changes.outputs.rust == 'true'
        uses: actions/checkout@v4
      - if: needs.changes.outputs.rust == 'true'
        name: Install ffmpeg
        # Many tests exec ffmpeg/ffprobe (testsrc generation, probe,
        # transcode, remux, verify-playable). 7z is needed by the
        # ISO-extract step's tests.
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg p7zip-full
      - if: needs.changes.outputs.rust == 'true'
        uses: dtolnay/rust-toolchain@stable
      - if: needs.changes.outputs.rust == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          # Share the cache across PRs — saves ~2 min of cold compile.
          shared-key: rust-tests
      - if: needs.changes.outputs.rust == 'true'
        name: Run tests
        run: cargo test --workspace --locked --all-targets --no-fail-fast

  web:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip — no web-relevant changes
        if: needs.changes.outputs.web != 'true'
        run: echo "No changes under web/ or tests.yml; skipping the web build."
      - if: needs.changes.outputs.web == 'true'
        uses: actions/checkout@v4
      - if: needs.changes.outputs.web == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - if: needs.changes.outputs.web == 'true'
        name: Install
        run: npm --prefix web ci
      - if: needs.changes.outputs.web == 'true'
        name: Build
        run: npm --prefix web run build
